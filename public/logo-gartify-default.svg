<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#1a3664"/>
  <!-- Letra G -->
  <text x="50" y="70" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="white">G</text>
  <!-- Punto naranja (accent brand) -->
  <circle cx="73" cy="27" r="13" fill="#F5A623"/>
  <!-- Llave inglesa en el punto naranja -->
  <g transform="translate(73,27) rotate(45)" fill="white">
    <rect x="-4" y="-9" width="8" height="18" rx="2"/>
    <rect x="-7" y="-9" width="14" height="5" rx="2"/>
    <rect x="-7" y="4" width="14" height="5" rx="2"/>
  </g>
</svg>
